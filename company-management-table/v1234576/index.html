<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cours interactif HTML + CSS + JavaScript</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">
  <header>
    <h1 class="text-center my-4">Company Management Software</h1>
  </header>

  <main class="container">

    <div class="row justify-content-center mb-4">
      <div class="col-md-8 col-lg-6">
    <form id="companyForm" class="card p-4">
      <div class="mb-3">
        <label for="createdAt" class="form-label">Created At</label>
        <input type="date" id="createdAt" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="company" class="form-label">Company</label>
        <input type="text" id="company" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="contact" class="form-label">Contact</label>
        <input type="text" id="contact" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="country" class="form-label">Country</label>
        <select id="country" class="form-select" required>
          <option value="">-- Select a country --</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="revenue" class="form-label">Revenue (M$)</label>
        <input type="number" id="revenue" class="form-control" required />
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="status" />
        <label class="form-check-label" for="status">Active</label>
      </div>

      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-primary" id="submitButton">Add</button>
        <button type="button" class="btn btn-secondary" id="cancelButton" disabled>Cancel</button>
      </div>
    </form>
      </div>
    </div>

     <section class="toolbar">
        <div class="toolbar-group toolbar-search">
          <label for="searchInput">Rechercher</label>
          <input type="text" id="searchInput" placeholder="Nom, contact, email, ID, pays, statut..." />
        </div>


     </section>

    <table id="companyTable" class="table table-bordered table-hover bg-white align-middle">
      <thead class="table-light">
        <tr>
          <th class="sortable" data-sort="createdAt">Created At <span class="sort-indicator"></span></th>
          <th>ID</th>
          <th class="sortable" data-sort="name">Company <span class="sort-indicator"></span></th>
          <th>Contact</th>
          <th>Email</th>
          <th>Country</th>
          <th class="sortable" data-sort="revenue">Revenue (in M$) <span class="sort-indicator"></span></th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="companyTableBody">

      </tbody>
    </table>

  </main>
  <script src="script.js"></script>
</body>
</html>
